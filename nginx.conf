server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 静态资源带 hash，可长期缓存
    location ~* \.(js|css|svg|png|jpg|jpeg|gif|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # index.html 不缓存，保证新版本即时生效
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # 路由回退：优先命中 prerender 生成的 /a/<slug>/index.html（带专属 OG），
    # 命不中再回退到 SPA 壳 index.html 交给前端路由。html 不缓存保证 OG 即时更新。
    location / {
        try_files $uri $uri/index.html /index.html;
        add_header Cache-Control "no-cache";
    }
}
